<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>方案C：纯文字时间线</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; padding: 40px; }
        .card { background: #fff; border-radius: 12px; padding: 24px; max-width: 500px; margin: 0 auto; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .card-title { font-size: 16px; font-weight: 600; color: #1a1a1a; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
        .card-title::before { content: "📅"; }
        .progress-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding: 12px 16px; background: #f6ffed; border-radius: 8px; border: 1px solid #b7eb8f; }
        .progress-info .label { font-size: 13px; color: #52c41a; font-weight: 500; }
        .progress-info .value { font-size: 20px; color: #52c41a; font-weight: 700; }
        .milestone-list { list-style: none; }
        .milestone-item { display: flex; align-items: flex-start; gap: 12px; padding: 12px 0; border-bottom: 1px solid #f5f5f5; }
        .milestone-item:last-child { border-bottom: none; }
        .milestone-icon { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 14px; }
        .milestone-icon.done { background: #f6ffed; color: #52c41a; }
        .milestone-icon.active { background: #e6f4ff; color: #1677ff; }
        .milestone-icon.pending { background: #f5f5f5; color: #999; }
        .milestone-info { flex: 1; }
        .milestone-title { font-size: 14px; color: #1a1a1a; font-weight: 500; display: flex; align-items: center; gap: 6px; }
        .milestone-date { font-size: 12px; color: #999; margin-top: 2px; }
        .star { color: #faad14; }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-title">项目进度</div>
        <div class="progress-info">
            <div class="label">当前阶段</div>
            <div class="value">进行中</div>
        </div>
        <ul class="milestone-list">
            <li class="milestone-item">
                <div class="milestone-icon done">✓</div>
                <div class="milestone-info">
                    <div class="milestone-title">合同签署 <span class="star">⭐</span></div>
                    <div class="milestone-date">2026-05-15</div>
                </div>
            </li>
            <li class="milestone-item">
                <div class="milestone-icon done">✓</div>
                <div class="milestone-info">
                    <div class="milestone-title">蓝图确认 <span class="star">⭐</span></div>
                    <div class="milestone-date">2026-06-01</div>
                </div>
            </li>
            <li class="milestone-item">
                <div class="milestone-icon active">●</div>
                <div class="milestone-info">
                    <div class="milestone-title">开发实施</div>
                    <div class="milestone-date">进行中...</div>
                </div>
            </li>
            <li class="milestone-item">
                <div class="milestone-icon pending">○</div>
                <div class="milestone-info">
                    <div class="milestone-title">上线验收 <span class="star">⭐</span></div>
                    <div class="milestone-date">待定</div>
                </div>
            </li>
        </ul>
    </div>
</body>
</html>
