<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>方案B：专业甘特图</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; padding: 40px; }
        .card { background: #fff; border-radius: 12px; padding: 24px; max-width: 700px; margin: 0 auto; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .card-title { font-size: 16px; font-weight: 600; color: #1a1a1a; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
        .card-title::before { content: "📅"; }
        .gantt-container { overflow-x: auto; }
        .gantt-header { display: flex; border-bottom: 1px solid #f0f0f0; padding-bottom: 8px; margin-bottom: 8px; }
        .gantt-header-task { width: 140px; flex-shrink: 0; font-size: 12px; color: #999; font-weight: 500; }
        .gantt-header-dates { flex: 1; display: flex; }
        .gantt-month { flex: 1; text-align: center; font-size: 12px; color: #999; font-weight: 500; }
        .gantt-row { display: flex; align-items: center; padding: 8px 0; border-bottom: 1px solid #fafafa; }
        .gantt-row:hover { background: #fafafa; }
        .gantt-task { width: 140px; flex-shrink: 0; font-size: 13px; color: #1a1a1a; display: flex; align-items: center; gap: 6px; }
        .gantt-task.milestone { color: #d48806; font-weight: 500; }
        .gantt-bar-container { flex: 1; position: relative; height: 24px; }
        .gantt-bar { position: absolute; height: 20px; border-radius: 4px; top: 2px; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #fff; font-weight: 500; }
        .gantt-bar.completed { background: linear-gradient(90deg, #52c41a, #73d13d); }
        .gantt-bar.in-progress { background: linear-gradient(90deg, #1677ff, #4096ff); }
        .gantt-bar.planned { background: #d9d9d9; color: #666; }
        .gantt-bar.milestone { background: linear-gradient(90deg, #faad14, #ffc53d); width: 20px !important; border-radius: 50%; }
        .gantt-today { position: absolute; top: 0; bottom: 0; width: 2px; background: #ff4d4f; z-index: 1; }
        .gantt-today::after { content: "今天"; position: absolute; top: -16px; left: -12px; font-size: 10px; color: #ff4d4f; }
        .gantt-grid { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; pointer-events: none; }
        .gantt-grid-line { flex: 1; border-right: 1px solid #f5f5f5; }
        .star { font-size: 12px; margin-left: 4px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-title">项目进度</div>
        <div class="gantt-container">
            <div class="gantt-header">
                <div class="gantt-header-task">任务</div>
                <div class="gantt-header-dates">
                    <div class="gantt-month">5月</div>
                    <div class="gantt-month">6月</div>
                    <div class="gantt-month">7月</div>
                </div>
            </div>
            <div style="position: relative;">
                <div class="gantt-grid">
                    <div class="gantt-grid-line"></div>
                    <div class="gantt-grid-line"></div>
                    <div class="gantt-grid-line"></div>
                </div>
                <div class="gantt-row">
                    <div class="gantt-task">合同签署 <span class="star">⭐</span></div>
                    <div class="gantt-bar-container">
                        <div class="gantt-bar completed milestone" style="left: 5%;"></div>
                    </div>
                </div>
                <div class="gantt-row">
                    <div class="gantt-task">蓝图确认 <span class="star">⭐</span></div>
                    <div class="gantt-bar-container">
                        <div class="gantt-bar completed" style="left: 5%; width: 25%;">5/10 - 5/30</div>
                    </div>
                </div>
                <div class="gantt-row">
                    <div class="gantt-task">开发实施</div>
                    <div class="gantt-bar-container">
                        <div class="gantt-bar in-progress" style="left: 35%; width: 30%;">6/1 - 7/10</div>
                    </div>
                </div>
                <div class="gantt-row">
                    <div class="gantt-task">上线验收 <span class="star">⭐</span></div>
                    <div class="gantt-bar-container">
                        <div class="gantt-bar planned" style="left: 68%; width: 20%;">7/15 - 7/30</div>
                    </div>
                </div>
                <div class="gantt-today" style="left: 42%;"></div>
            </div>
        </div>
    </div>
</body>
</html>
